name: mdbook

# Build the docs/ tree with mdBook and publish to GitHub Pages.
# Requires Pages source = "GitHub Actions" (Settings -> Pages, or the gh api call
# in the PR that introduced this). Per-PR link/quality checks live in docs.yml;
# this workflow only builds + deploys from master.
on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/mdbook.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.5.3
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz
          echo "$PWD" >> "$GITHUB_PATH"
      - uses: actions/configure-pages@v5
      - name: Build the book
        run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
